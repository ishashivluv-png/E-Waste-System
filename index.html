<!DOCTYPE html>
<html>
<head>
    <title>Smart E-Waste Admin</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Smart E-Waste Ecosystem</h1>
        
        <div class="status-grid">
            <div class="card">
                <h3>Temperature</h3>
                <p id="temp">-- °C</p>
            </div>
            <div class="card">
                <h3>Gas Level</h3>
                <p id="gas">--</p>
            </div>
            <div class="card">
                <h3>Fill Level</h3>
                <p id="fill">-- %</p>
            </div>
        </div>

        <div class="action-section">
            <h2>Select Disposal Category</h2>
            <button class="btn battery" onclick="sendDisposal('battery')">BATTERY (+30 pts)</button>
            <button class="btn pcb" onclick="sendDisposal('pcb')">PCB (+25 pts)</button>
            <button class="btn others" onclick="sendDisposal('others')">OTHERS (+5 pts)</button>
        </div>
        
        <div id="log">System Ready. Waiting for selection...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
