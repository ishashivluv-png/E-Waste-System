<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Waste Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="qr-container">
        <h1>E-Waste Bin System</h1>
        <h2>Scan QR Code to Open System</h2>
        <div id="qr">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://10.41.72.154" alt="System QR">
        </div>
        <p>Manage waste disposal from your mobile device.</p>
        <button class="btn-green" onclick="startSystem()">Enter System</button>
    </div>

    <div id="login" class="card" style="display:none;">
        <h2>System Login</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button class="btn-green" onclick="login()">Login</button>
        <p id="login-error" style="color:red; font-size:12px;"></p>
    </div>

    <div id="main" style="display:none;">

        <div id="adminPage" class="card" style="display:none;">
            <h2>Admin Dashboard</h2>
            <div class="stats-container">
                <p>🌡️ <strong>Temp:</strong> <span id="temp">--</span>°C</p>
                <p>💨 <strong>Gas:</strong> <span id="gas">--</span></p>
                <p>🗑️ <strong>Bin Fill:</strong> <span id="level">--</span>%</p>
            </div>
            <div id="alert"></div>
            <button class="btn-logout" onclick="location.reload()">Logout</button>
        </div>

        <div id="userPage" class="card" style="display:none;">
            <h2>Welcome, <span id="userDisplay"></span></h2>
            <p class="sub-text">Select the item you are disposing:</p>
            
            <select id="item">
                <option value="battery">Battery (10 pts)</option>
                <option value="pcb">PCB (20 pts)</option>
                <option value="mobile">Mobile Phone (30 pts)</option>
                <option value="others">Others (5 pts)</option>
            </select>
            
            <button class="btn-green" onclick="submitWaste()">Submit Waste</button>

            <div class="score-card">
                <h3 id="points">⭐ Total Points: 0</h3>
                <div id="reward">Points are added after each submission.</div>
            </div>
            <button class="btn-logout" onclick="location.reload()">Logout</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
