<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart E-Waste Bin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Smart E-Waste Bin System</h1>
        <p id="status">Connecting to Bin...</p>
    </header>

    <main>
        <section class="card">
            <h2>Dispose Your Waste</h2>
            <div class="button-grid">
                <button onclick="sendCommand('battery')">🔋 Battery</button>
                <button onclick="sendCommand('pcb')">📟 PCB / Circuit</button>
                <button onclick="sendCommand('others')">🔌 Others</button>
            </div>
            <div id="coupon-box" class="hidden">
                <p>Thank you! Your Coupon Code:</p>
                <h3 id="coupon-code">EWaste-100-OFF</h3>
            </div>
        </section>

        <section class="card admin">
            <h2>Admin Real-Time Monitor</h2>
            <div class="stats-grid">
                <div class="stat">
                    <span>Temperature</span>
                    <strong id="temp">--</strong>°C
                </div>
                <div class="stat">
                    <span>Bin Fill Level</span>
                    <strong id="fill">--</strong>%
                </div>
                <div class="stat">
                    <span>Gas Level</span>
                    <strong id="gas">--</strong>
                </div>
                <div class="stat">
                    <span>Dust (ug/m3)</span>
                    <strong id="dust">--</strong>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
