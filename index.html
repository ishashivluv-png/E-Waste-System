<!DOCTYPE html>
<html>
<head>
    <title>E-Waste System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Scan QR Code to Open System</h2>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://ishashivluv-png.github.io/e-waste-system/">

<br><br>

<div id="login">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>

    <button onclick="login()">Login</button>
</div>





<!-- MAIN PAGE -->
<div id="main" style="display:none;">

    <!-- ADMIN PAGE -->
    <div id="adminPage" style="display:none;">
        <h2>Welcome Admin</h2>

        <p>Temperature: <span id="temp"></span></p>
        <p>Gas Sensor: <span id="gas"></span></p>
        <p>Dust Level: <span id="dust"></span></p>
        <p>Bin Level: <span id="level"></span></p>

        <p id="alert"></p>
    </div>

    <!-- USER PAGE -->
    <div id="userPage" style="display:none;">

        <h2>Welcome, <span id="userDisplay"></span></h2>

        <select id="item">
            <option>Battery</option>
            <option>PCB</option>
            <option>Mobile Phone</option>
            <option>Others</option>
        </select>

        <br><br>
        <button onclick="submitWaste()">Submit</button>

        <h3 id="points"></h3>
        <h3 id="reward"></h3>

    </div>

</div>
<!-- ADD HERE -->
<script src="script.js"></script>

</body>
</html>
